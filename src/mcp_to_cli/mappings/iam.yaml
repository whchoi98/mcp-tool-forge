        PathPrefix: path_prefix
        MaxItems: max_items
    cli:
      command: "aws iam list-policies"
      params:
        --scope: scope
        --only-attached: only_attached
        --path-prefix: path_prefix
        --max-items: max_items

  get_managed_policy_document:
