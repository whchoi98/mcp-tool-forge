tools:
  list_users:
    boto3:
      client: iam
      method: list_users
      params:
        PathPrefix: path_prefix
        MaxItems: max_items
    cli:
      command: "aws iam list-users"
      params:
        --path-prefix: path_prefix
        --max-items: max_items

  get_user:
    boto3:
      client: iam
      method: get_user
      params:
        UserName: user_name
    cli:
      command: "aws iam get-user"
      params:
        --user-name: user_name

  create_user:
    boto3:
      client: iam
      method: create_user
      params:
        UserName: user_name
        Path: path
        PermissionsBoundary: permissions_boundary
    cli:
      command: "aws iam create-user"
      params:
        --user-name: user_name
        --path: path
        --permissions-boundary: permissions_boundary

  delete_user:
    boto3:
      client: iam
      method: delete_user
      params:
        UserName: user_name
        Force: force
    cli:
      command: "aws iam delete-user"
      params:
        --user-name: user_name
        --force: force

  list_roles:
    boto3:
      client: iam
      method: list_roles
      params:
        PathPrefix: path_prefix
        MaxItems: max_items
    cli:
      command: "aws iam list-roles"
      params:
        --path-prefix: path_prefix
        --max-items: max_items

  create_role:
    boto3:
      client: iam
      method: create_role
      params:
        RoleName: role_name
        AssumeRolePolicyDocument: assume_role_policy_document
        Path: path
        Description: description
        MaxSessionDuration: max_session_duration
        PermissionsBoundary: permissions_boundary
    cli:
      command: "aws iam create-role"
      params:
        --role-name: role_name
        --assume-role-policy-document: assume_role_policy_document
        --path: path
        --description: description
        --max-session-duration: max_session_duration
        --permissions-boundary: permissions_boundary

  list_policies:
    boto3:
