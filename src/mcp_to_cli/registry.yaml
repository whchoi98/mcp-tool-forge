# MCP Server Registry / MCP 서버 레지스트리
# 67 AWS MCP server configurations / 67개 AWS MCP 서버 설정
servers:
  # Essential Setup / 필수 설정
  aws-mcp-server:
    package: "mcp-proxy-for-aws"
    runtime: uvx
    transport: stdio
    category: Essential Setup
    description: "Secure AWS operations with API access and docs"

  # Core / 코어
  aws-api-mcp-server:
    package: "awslabs.aws-api-mcp-server"
    runtime: uvx
    transport: stdio
    category: Core
    description: "Interact with AWS services via API calls"

  core-mcp-server:
    package: "awslabs.core-mcp-server"
    runtime: uvx
    transport: stdio
    category: Core
    description: "Intelligent planning and cost estimation for AWS"

  # Documentation / 문서
  aws-documentation-mcp-server:
    package: "awslabs.aws-documentation-mcp-server"
    runtime: uvx
    transport: stdio
    category: Documentation
    description: "Latest AWS documentation and API references"

  aws-knowledge-mcp-server:
    package: "@anthropic/aws-knowledge-mcp-server"
    runtime: npx
    transport: sse
    category: Documentation
    description: "AWS docs, code examples, official resources (HTTP remote endpoint)"

  # Infrastructure & Deployment / 인프라 및 배포
  aws-cloudcontrol-mcp-server:
    package: "awslabs.ccapi-mcp-server"
    runtime: uvx
    transport: stdio
    category: "Infrastructure & Deployment"
    description: "AWS resource management with CRUDL and security scanning"

  aws-cdk-mcp-server:
